name: Build_Test_Pipeline

on:
  push:
    branches: [ "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [ staging, prod ]
      image_tag:
        description: "Image tag to deploy (defaults to latest build)"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/devops-service
  DOTNET_VERSION: "10.0.x"

jobs:
  # ── 1. LINT/FORMATTING ────────────────────────────────────────────────────────────────
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --severity warn

      - name: Build with analyzers
        run: dotnet build --no-restore --configuration Release

  # ── 2. TEST ────────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Run unit tests
        run: |
          dotnet test tests/DevOpsService.UnitTests \
            --no-restore \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/unit \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Run integration tests
        env:
          ApiKey: ${{ secrets.API_KEY }}
        run: |
          dotnet test tests/DevOpsService.IntegrationTests \
            --no-restore \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/integration \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Generate coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"./coverage/report" \
            -reporttypes:"Html;Cobertura;MarkdownSummaryGithub"

      - name: Enforce coverage threshold (80%)
        run: |
          dotnet tool install --global dotnet-coverage
          dotnet-coverage merge ./coverage/**/coverage.cobertura.xml \
            --output ./coverage/merged.cobertura.xml \
            --output-format cobertura
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse("./coverage/merged.cobertura.xml")
          rate = float(tree.getroot().attrib.get("line-rate", 0))
          pct = rate * 100
          print(f"Line coverage: {pct:.1f}%")
          sys.exit(0 if pct >= 80 else 1)
          EOF

      - name: Post coverage summary
        if: always()
        run: cat ./coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report/

  # ── 3. BUILD ────────────────────────────────────────────────
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max