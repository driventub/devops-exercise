services:

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops_app1
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiKey=${API_KEY}
      - JwtSecret=${JWT_SECRET}
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    env_file:
      - .env

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops_app2
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiKey=${API_KEY}
      - JwtSecret=${JWT_SECRET}

    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: devops_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
    restart: unless-stopped
